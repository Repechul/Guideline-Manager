<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- borde exterior -->
  <rect x="1" y="1" width="14" height="14" fill="none" stroke="#ffffff" stroke-width="1"/>
  <!-- linea guia vertical centrada -->
  <line x1="8" y1="1" x2="8" y2="15" stroke="#ffffff" stroke-width="1" stroke-dasharray="2,1"/>
  <!-- linea guia horizontal centrada -->
  <line x1="1" y1="8" x2="15" y2="8" stroke="#ffffff" stroke-width="1" stroke-dasharray="2,1"/>
  <!-- marca de interseccion -->
  <rect x="7" y="7" width="2" height="2" fill="#ffffff"/>
</svg>
